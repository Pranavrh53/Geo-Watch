<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛰️ Geo-Watch - Analysis Terminal</title>
    <!-- Google Fonts - Retro Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: #f5f5f5;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 49px, #00B8A9 49px, #00B8A9 50px),
                repeating-linear-gradient(90deg, transparent, transparent 49px, #00B8A9 49px, #00B8A9 50px);
            background-size: 50px 50px;
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: white;
            padding: 20px 30px;
            display:flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid #00B8A9;
            box-shadow: 0 10px 0 rgba(0, 184, 169, 0.2);
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #B2E600 0%, #FF7070 25%, #00B8A9 50%, #5555FF 75%);
        }

        .header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9em;
            color: #00B8A9;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-size: 0.7em;
            font-family: 'Press Start 2P', cursive;
            transition: all 0.1s;
            text-transform: uppercase;
            border: 3px solid;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF7070 0%, #FF5555 100%);
            color: white;
            border-color: #FF5555;
            border-width: 4px;
            box-shadow: 6px 6px 0 rgba(255, 112, 112, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 rgba(255, 112, 112, 0.3);
            background: linear-gradient(135deg, #FF8080 0%, #FF7070 100%);
        }

        .btn-primary:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(255, 112, 112, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.7);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #00B8A9, #00A99D);
            color: white;
            border-color: #00A99D;
            border-width: 4px;
            box-shadow: 6px 6px 0 rgba(0, 184, 169, 0.3);
            font-weight: bold;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #00C9BA, #00B8A9);
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 rgba(0, 184, 169, 0.3);
        }

        .btn-secondary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(0, 184, 169, 0.3);
        }

        .comparison-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .view-mode-tabs {
            display: flex;
            background: #ffffff;
            padding: 15px 30px;
            gap: 15px;
            border-bottom: 6px solid #00B8A9;
            box-shadow: 0 6px 0 rgba(0, 184, 169, 0.2);
        }

        .tab-btn {
            padding: 12px 25px;
            background: #f5f5f5;
            border: 4px solid #00B8A9;
            color: #00B8A9;
            cursor: pointer;
            border-radius: 0;
            transition: all 0.2s;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65em;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 rgba(0, 184, 169, 0.2);
        }

        .tab-btn.active {
            background: #FF7070;
            color: white;
            border-color: #FF7070;
            box-shadow: 6px 6px 0 rgba(255, 112, 112, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: #00B8A9;
            color: white;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(0, 184, 169, 0.3);
        }

        /* Side by side view */
        .side-by-side {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
            display: none;
        }

        .side-by-side.active {
            display: grid;
        }

        .image-panel {
            background: white;
            border: 6px solid #B2E600;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 8px 8px 0 rgba(178, 230, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .image-panel:nth-child(2) {
            border-color: #FF7070;
            box-shadow: 8px 8px 0 rgba(255, 112, 112, 0.2);
        }

        .image-panel:nth-child(2) .image-header {
            background: linear-gradient(135deg, #FF7070 0%, #FF5555 100%);
            border-bottom-color: #FF5555;
            color: white;
        }

        .image-panel:nth-child(2) .image-date {
            color: white;
        }

        .image-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #B2E600 0%, #A0D000 100%);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #A0D000;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65em;
            color: #1a1a1a;
        }

        .image-date {
            font-size: 0.9em;
            color: #1a1a1a;
            font-family: 'Space Mono', monospace;
        }

        .image-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-content img {
            max-width: 100%;
            max-height: 100%;
            border: 5px solid #00B8A9;
            border-radius: 0;
            box-shadow: 6px 6px 0 rgba(0, 184, 169, 0.2);
            image-rendering: crisp-edges;
        }

        /* Slider view */
        .slider-view {
            flex: 1;
            padding: 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .slider-view.active {
            display: flex;
        }

        .slider-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 1;
            background: white;
            border: 8px solid #5555FF;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 10px 10px 0 rgba(85, 85, 255, 0.2);
        }

        .image-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .image-after {
            clip-path: inset(0 50% 0 0);
        }

        .slider-handle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 8px;
            height: 100%;
            background: linear-gradient(0deg, #FF7070 0%, #5555FF 50%, #00B8A9 100%);
            cursor: ew-resize;
            z-index: 10;
            box-shadow: 0 0 0 4px white;
        }

        .slider-handle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: #FF7070;
            border: 5px solid #5555FF;
            border-radius: 0;
            box-shadow: 6px 6px 0 rgba(85, 85, 255, 0.3);
        }

        .slider-handle::after {
            content: '⟷';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            width: 90%;
            max-width: 800px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7em;
        }

        .label-before {
            color: #B2E600;
        }

        .label-after {
            color: #FF7070;
        }

        .info-panel {
            background: white;
            padding: 25px;
            margin-top: 30px;
            border: 6px solid #00B8A9;
            border-radius: 0;
            width: 90%;
            max-width: 800px;
            box-shadow: 8px 8px 0 rgba(0, 184, 169, 0.2);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 3px dashed #e0e0e0;
            font-family: 'Space Mono', monospace;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #1a1a1a;
            font-weight: 600;
        }

        .info-row span:last-child {
            color: #00B8A9;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-family: 'Press Start 2P', cursive;
            color: #00B8A9;
        }

        .spinner {
            border: 6px solid #f0f0f0;
            border-top: 6px solid #B2E600;
            border-right: 6px solid #FF7070;
            border-bottom: 6px solid #00B8A9;
            border-left: 6px solid #5555FF;
            border-radius: 0;
            width: 60px;
            height: 60px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
            box-shadow: 6px 6px 0 rgba(0, 184, 169, 0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛰️ Geo-Watch - Image Comparison</h1>
        <div class="header-buttons">
            <button class="btn btn-secondary" onclick="goBack()">← Back to Map</button>
            <button class="btn btn-primary" onclick="runBuildingDetection()" id="building-btn"
                    style="background: linear-gradient(135deg, #FF8C00, #FF6600); border-color: #FF6600;">
                🏗️ Detect Buildings
            </button>
        </div>
    </div>

    <div class="view-mode-tabs">
        <button class="tab-btn active" onclick="switchView('side-by-side')">Side by Side</button>
        <button class="tab-btn" onclick="switchView('slider')">Slider Compare</button>
    </div>

    <div class="comparison-container">
        <!-- Side by Side View -->
        <div class="side-by-side active" id="side-by-side-view">
            <div class="image-panel">
                <div class="image-header">
                    <span>BEFORE</span>
                    <span class="image-date" id="before-date-display">Loading...</span>
                </div>
                <div class="image-content">
                    <img id="before-image" src="" alt="Before">
                </div>
            </div>

            <div class="image-panel">
                <div class="image-header">
                    <span>AFTER</span>
                    <span class="image-date" id="after-date-display">Loading...</span>
                </div>
                <div class="image-content">
                    <img id="after-image" src="" alt="After">
                </div>
            </div>
        </div>

        <!-- Slider View -->
        <div class="slider-view" id="slider-view">
            <div class="slider-container" id="slider-container">
                <div class="image-layer image-before" id="image-before-layer"></div>
                <div class="image-layer image-after" id="image-after-layer"></div>
                <div class="slider-handle" id="slider-handle"></div>
            </div>
            
            <div class="slider-labels">
                <span class="label-before">◀ BEFORE: <span id="before-date-label">...</span></span>
                <span class="label-after">AFTER: <span id="after-date-label">...</span> ▶</span>
            </div>

            <div class="info-panel">
                <div class="info-row">
                    <span class="info-label">Region</span>
                    <span id="region-info">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Area</span>
                    <span id="area-info">~0 km²</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Time Span</span>
                    <span id="timespan-info">0 days</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let beforeImageUrl = '';
        let afterImageUrl = '';
        let beforeDate = '';
        let afterDate = '';
        let bbox = null;
        let currentSource = 'sentinel';
        const accessToken = localStorage.getItem('access_token');

        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        beforeImageUrl = params.get('before');
        afterImageUrl = params.get('after');
        beforeDate = params.get('beforeDate');
        afterDate = params.get('afterDate');
        bbox = JSON.parse(params.get('bbox') || 'null');
        currentSource = params.get('source') || 'sentinel';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadImages();
            initSlider();
            displayInfo();
        });

        function loadImages() {
            if (!beforeImageUrl || !afterImageUrl || !accessToken) {
                alert('Invalid parameters or session expired');
                goBack();
                return;
            }

            // Set side-by-side images
            document.getElementById('before-image').src = `${API_URL}${beforeImageUrl}`;
            document.getElementById('after-image').src = `${API_URL}${afterImageUrl}`;

            // Set slider images
            document.getElementById('image-before-layer').style.backgroundImage = `url(${API_URL}${beforeImageUrl})`;
            document.getElementById('image-after-layer').style.backgroundImage = `url(${API_URL}${afterImageUrl})`;

            // Set dates
            document.getElementById('before-date-display').textContent = beforeDate;
            document.getElementById('after-date-display').textContent = afterDate;
            document.getElementById('before-date-label').textContent = beforeDate;
            document.getElementById('after-date-label').textContent = afterDate;
        }

        function initSlider() {
            const container = document.getElementById('slider-container');
            const handle = document.getElementById('slider-handle');
            const afterLayer = document.getElementById('image-after-layer');
            
            let isDragging = false;

            handle.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mouseup', () => isDragging = false);

            container.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percentage = (x / rect.width) * 100;
                
                if (percentage >= 0 && percentage <= 100) {
                    handle.style.left = percentage + '%';
                    afterLayer.style.clipPath = `inset(0 ${100 - percentage}% 0 0)`;
                }
            });

            // Touch support
            handle.addEventListener('touchstart', () => isDragging = true);
            document.addEventListener('touchend', () => isDragging = false);

            container.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                
                const rect = container.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                const percentage = (x / rect.width) * 100;
                
                if (percentage >= 0 && percentage <= 100) {
                    handle.style.left = percentage + '%';
                    afterLayer.style.clipPath = `inset(0 ${100 - percentage}% 0 0)`;
                }
            });
        }

        function displayInfo() {
            if (bbox) {
                // Calculate area
                const latDiff = bbox.north - bbox.south;
                const lonDiff = bbox.east - bbox.west;
                const avgLat = (bbox.north + bbox.south) / 2;
                const latKm = latDiff * 111;
                const lonKm = lonDiff * 111 * Math.cos(avgLat * Math.PI / 180);
                const area = (latKm * lonKm).toFixed(2);

                document.getElementById('region-info').textContent = 
                    `${bbox.north.toFixed(4)}°N, ${bbox.east.toFixed(4)}°E`;
                document.getElementById('area-info').textContent = `~${area} km²`;
            }

            if (beforeDate && afterDate) {
                const before = new Date(beforeDate);
                const after = new Date(afterDate);
                const days = Math.floor((after - before) / (1000 * 60 * 60 * 24));
                const years = (days / 365).toFixed(1);
                document.getElementById('timespan-info').textContent = 
                    `${days} days (~${years} years)`;
            }
        }

        function switchView(view) {
            // Update tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update views
            document.getElementById('side-by-side-view').classList.remove('active');
            document.getElementById('slider-view').classList.remove('active');

            if (view === 'side-by-side') {
                document.getElementById('side-by-side-view').classList.add('active');
            } else {
                document.getElementById('slider-view').classList.add('active');
            }
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function resetImages() {
            // Restore original satellite images
            document.getElementById('before-image').src = `${API_URL}${beforeImageUrl}`;
            document.getElementById('after-image').src = `${API_URL}${afterImageUrl}`;
        }

        // ============================================================
        // BUILDING DETECTION
        // ============================================================

        async function runBuildingDetection() {
            const btn = document.getElementById('building-btn');
            btn.disabled = true;
            btn.textContent = '🔄 Detecting...';

            // Clean up previous run: reset images and close old results panel
            resetImages();
            closeBuildingResults();

            try {
                const beforePath = beforeImageUrl.replace('/api/tile/image/', 'data/tile_cache/');
                const afterPath = afterImageUrl.replace('/api/tile/image/', 'data/tile_cache/');

                const response = await fetch(`${API_URL}/api/ai/buildings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({
                        before_image_path: beforePath,
                        after_image_path: afterPath,
                        pixel_resolution: 10.0
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Detection failed');
                }

                const results = await response.json();
                displayBuildingResults(results);

            } catch (error) {
                console.error('Building detection failed:', error);
                alert(`Building detection failed: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '🏗️ Detect Buildings';
            }
        }

        function displayBuildingResults(results) {
            const r = results;
            const changePct = r.change.percent_change;
            const isGrowth = changePct > 0;

            const html = `
                <div style="position: fixed; top: 10%; right: 20px; width: 420px; background: white; 
                            border: 6px solid #FF8C00; padding: 25px; z-index: 10000; 
                            box-shadow: 10px 10px 0 rgba(255, 140, 0, 0.3); border-radius: 0;
                            font-family: 'Space Mono', monospace; max-height: 80vh; overflow-y: auto;">
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3 style="font-family: 'Press Start 2P', cursive; font-size: 0.75em; margin: 0; color: #FF8C00;">
                            🏗️ New Buildings
                        </h3>
                        <button onclick="closeBuildingResults()" style="background: #FF8C00; border: 3px solid #FF6600; 
                                color: white; padding: 8px 15px; cursor: pointer; font-family: 'Press Start 2P'; 
                                font-size: 0.6em; border-radius: 0;">✕</button>
                    </div>

                    <p style="font-size: 0.75em; color: #888; margin: 0 0 15px 0;">
                        Method: HSV Colour Analysis + Excess-Green Index + Edge Density
                    </p>

                    <!-- Before stats -->
                    <div style="background: #f8f8f8; padding: 12px; border-left: 5px solid #0078FF; margin-bottom: 12px;">
                        <h4 style="margin: 0 0 8px 0; font-size: 0.85em;">📊 BEFORE (${beforeDate})</h4>
                        <p style="margin: 3px 0; color: #333;">Built-up: <strong>${r.before.buildup_percent}%</strong></p>
                        <p style="margin: 3px 0; color: #666; font-size: 0.85em;">
                            ${r.before.buildup_hectares} ha (${r.before.buildup_acres} acres)
                        </p>
                    </div>

                    <!-- After stats -->
                    <div style="background: #f8f8f8; padding: 12px; border-left: 5px solid #FF8C00; margin-bottom: 12px;">
                        <h4 style="margin: 0 0 8px 0; font-size: 0.85em;">📊 AFTER (${afterDate})</h4>
                        <p style="margin: 3px 0; color: #333;">Built-up: <strong>${r.after.buildup_percent}%</strong></p>
                        <p style="margin: 3px 0; color: #666; font-size: 0.85em;">
                            ${r.after.buildup_hectares} ha (${r.after.buildup_acres} acres)
                        </p>
                    </div>

                    <!-- Change summary -->
                    <div style="background: ${isGrowth ? '#FFF3E0' : '#E8F5E9'}; padding: 12px; 
                                border-left: 5px solid ${isGrowth ? '#FF8C00' : '#4CAF50'}; margin-bottom: 15px;">
                        <h4 style="margin: 0 0 8px 0; font-size: 0.85em;">
                            ${isGrowth ? '📈' : '📉'} CHANGE DETECTED
                        </h4>
                        <p style="margin: 3px 0;"><strong>New construction zones:</strong> ${r.change.new_clusters}</p>
                        <p style="margin: 3px 0;"><strong>New built-up area:</strong> +${r.change.new_buildup_hectares} ha</p>
                        <p style="margin: 3px 0;"><strong>Removed/cleared:</strong> -${r.change.removed_hectares} ha</p>
                        <p style="margin: 8px 0 0 0; font-size: 1.1em; font-weight: bold; 
                                  color: ${isGrowth ? '#E65100' : '#2E7D32'};">
                            Net change: ${isGrowth ? '+' : ''}${r.change.net_change_hectares} ha 
                            (${isGrowth ? '+' : ''}${changePct.toFixed(1)}%)
                        </p>
                    </div>

                    <!-- Legend -->
                    <div style="background: #f5f5f5; padding: 10px; margin-bottom: 15px; font-size: 0.8em;">
                        <strong>Legend:</strong>
                        <div style="margin-top: 5px;">
                            <span style="display:inline-block;width:14px;height:14px;background:rgba(0,120,255,0.4);
                                         border:2px solid #0050DD;vertical-align:middle;margin-right:5px;"></span>
                            Existing buildings (before)
                        </div>
                        <div style="margin-top: 3px;">
                            <span style="display:inline-block;width:14px;height:14px;background:rgba(255,140,0,0.5);
                                         border:2px solid #FF6400;vertical-align:middle;margin-right:5px;"></span>
                            <strong>NEW construction (after)</strong>
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <button onclick="showBuildingOverlays()" 
                            style="width: 100%; padding: 12px; background: linear-gradient(135deg, #FF8C00, #FF6600); 
                                   color: white; border: 4px solid #FF6600; font-family: 'Press Start 2P'; 
                                   font-size: 0.65em; cursor: pointer; margin-bottom: 8px; border-radius: 0;
                                   box-shadow: 4px 4px 0 rgba(255, 100, 0, 0.3);">
                        👁️ Show on Images
                    </button>

                    <button onclick="resetImages(); closeBuildingResults()" 
                            style="width: 100%; padding: 12px; background: linear-gradient(135deg, #666, #444); 
                                   color: white; border: 4px solid #444; font-family: 'Press Start 2P'; 
                                   font-size: 0.65em; cursor: pointer; margin-bottom: 8px; border-radius: 0;">
                        🔄 Reset
                    </button>

                    <button onclick="showDifferenceView()" 
                            style="width: 100%; padding: 12px; background: linear-gradient(135deg, #7C4DFF, #651FFF); 
                                   color: white; border: 4px solid #651FFF; font-family: 'Press Start 2P'; 
                                   font-size: 0.65em; cursor: pointer; border-radius: 0;
                                   box-shadow: 4px 4px 0 rgba(101, 31, 255, 0.3);">
                        🗺️ Show Difference Map
                    </button>
                </div>
            `;

            // Store results
            window._buildingResults = results;

            const existing = document.getElementById('building-results-panel');
            if (existing) existing.remove();

            const panel = document.createElement('div');
            panel.id = 'building-results-panel';
            panel.innerHTML = html;
            document.body.appendChild(panel);
        }

        function showBuildingOverlays() {
            if (!window._buildingResults) return;
            const r = window._buildingResults;
            document.getElementById('before-image').src = r.before.overlay_image;
            document.getElementById('after-image').src = r.overlays.new_buildings;
        }

        function showDifferenceView() {
            if (!window._buildingResults) return;
            const r = window._buildingResults;
            // Show difference map on both panels for clear comparison
            document.getElementById('before-image').src = r.before.overlay_image;
            document.getElementById('after-image').src = r.overlays.difference;
        }

        function closeBuildingResults() {
            const panel = document.getElementById('building-results-panel');
            if (panel) panel.remove();
        }
    </script>
</body>
</html>
